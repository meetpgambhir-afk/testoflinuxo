<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TinyCore Browser VM</title>
<style>
  body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
  #controls { position: fixed; top: 5px; left: 5px; z-index: 10; }
  button, input { margin: 5px; }
  #screen { width: 100vw; height: 100vh; display: block; }
</style>
</head>
<body>

<div id="controls">
  RAM: <input type="range" id="ramSlider" min="16" max="512" value="64"> MB
  <button id="fullscreenBtn">Fullscreen</button>
</div>
<canvas id="screen"></canvas>

<script src="https://copy.sh/v86/build/libv86.js"></script>
<script>
  const canvas = document.getElementById("screen");
  const ramSlider = document.getElementById("ramSlider");
  const fullscreenBtn = document.getElementById("fullscreenBtn");

  let memorySize = parseInt(ramSlider.value) * 1024 * 1024;

  let tcore_vm = new V86Starter({
      wasm_path: "https://copy.sh/v86/build/libv86.wasm",
      memory_size: memorySize,
      vga_memory_size: 2*1024*1024,
      screen_container: canvas,
      autostart: true,
      cdrom: {
          url: "https://github.com/meetpgambhir-afk/testoflinuxo/raw/refs/heads/main/TinyCore-current.iso",
      },
      network_relay_url: "wss://copy.sh/v86network", // optional networking
  });

  // Inject DNS setup in bootlocal.sh
  tcore_vm.add_file("/opt/bootlocal.sh", `
#!/bin/sh
echo "nameserver 8.8.8.8" > /etc/resolv.conf
echo "nameserver 1.1.1.1" >> /etc/resolv.conf
`);

  // RAM slider
  ramSlider.addEventListener("input", () => {
      alert("Changing RAM dynamically is not supported by libv86. Restart VM with new value.");
  });

  // Fullscreen button
  fullscreenBtn.addEventListener("click", () => {
      if (canvas.requestFullscreen) canvas.requestFullscreen();
      else if (canvas.webkitRequestFullscreen) canvas.webkitRequestFullscreen();
      else if (canvas.mozRequestFullScreen) canvas.mozRequestFullScreen();
  });

  console.log("TinyCore VM initialized. DNS auto-set via bootlocal.sh");
</script>
</body>
</html>
