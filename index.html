<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TinyCore Linux Web VM</title>

<script src="https://copy.sh/v86/build/libv86.js"></script>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial;
    text-align: center;
}

#screen {
    width: 800px;
    height: 600px;
    margin: auto;
    border: 3px solid #444;
    background: black;
}

.controls {
    margin: 15px;
}

button, input {
    padding: 8px;
    margin: 5px;
    font-size: 14px;
}
</style>
</head>

<body>

<h2>TinyCore Linux Web VM</h2>

<div class="controls">
    RAM:
    <input type="range" id="ramSlider" min="128" max="1024" value="256" step="64">
    <span id="ramValue">256 MB</span>
    <br>

    <button onclick="startVM()">Start VM</button>
    <button onclick="goFullscreen()">Fullscreen</button>
</div>

<div id="screen"></div>

<script>
let emulator = null;

const slider = document.getElementById("ramSlider");
const ramValue = document.getElementById("ramValue");

slider.oninput = function() {
    ramValue.innerText = this.value + " MB";
};

function startVM() {
    if (emulator) return;

    const ramMB = parseInt(slider.value);

    emulator = new V86({
        wasm_path: "https://copy.sh/v86/build/v86.wasm",
        memory_size: ramMB * 1024 * 1024,
        vga_memory_size: 8 * 1024 * 1024,
        screen_container: document.getElementById("screen"),

        bios: { url: "https://copy.sh/v86/bios/seabios.bin" },
        vga_bios: { url: "https://copy.sh/v86/bios/vgabios.bin" },

       cdrom: {
    url: "TinyCore-current.iso"
},

        autostart: true
    });
}

function goFullscreen() {
    const screen = document.getElementById("screen");
    if (screen.requestFullscreen) {
        screen.requestFullscreen();
    } else if (screen.webkitRequestFullscreen) {
        screen.webkitRequestFullscreen();
    } else if (screen.msRequestFullscreen) {
        screen.msRequestFullscreen();
    }
}
</script>

</body>
</html>
